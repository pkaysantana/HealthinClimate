name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python-tests:
    name: Python engine + API tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install (engine + api + dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[api,dev]"
      - name: Run tests
        run: pytest -q   # network tests are skipped by default (see pyproject addopts)

  web-build:
    name: React dashboard build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install + build
        working-directory: web
        run: |
          npm ci
          npm run build
